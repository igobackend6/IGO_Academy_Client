org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true

# ── Kotlin stability fixes (Kotlin 1.9.25 — no BTAPI, no cache locking) ───
# Disable incremental compilation so no .tab cache files are written
kotlin.incremental=false
kotlin.incremental.java=false

# Single-threaded Gradle, one daemon — no file lock contention
org.gradle.parallel=false
org.gradle.daemon=true
org.gradle.daemon.idletimeout=3600000
org.gradle.workers.max=1

# In-process compiler — no separate Kotlin daemon process on Windows
kotlin.compiler.execution.strategy=in-process

# android.builtInKotlin and android.newDsl removed — both cause ERROR-level
# deprecation in AGP 9.0 and must not be set.
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
