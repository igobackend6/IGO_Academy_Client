name: igo_academy
description: IGO Academy - E-Learning Platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Backend - Supabase
  supabase_flutter: ^2.5.3

  # Firebase
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.4
  firebase_analytics: ^11.1.0

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Video Player
  video_player: ^2.9.2
  chewie: ^1.8.5
  cached_network_image: ^3.3.1

  # PDF Viewer
  flutter_pdfview: ^1.3.2

  # Fonts (loaded at runtime — no bundled TTF files needed)
  google_fonts: ^6.2.1

  # UI Components
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^5.0.0

  # HTTP & Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  url_launcher: ^6.2.6
  share_plus: ^13.1.0
  image_picker: ^1.1.1
  permission_handler: ^11.3.1

  # Forms & Validation
  form_validator: ^2.1.1

  # OTP Input
  pinput: ^6.0.0

  # Icons
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generation
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/logo/
    - assets/categories/
    - assets/popular_courses/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/IGO Academy.jpg"
  min_sdk_android: 21
